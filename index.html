<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />

<title>Fireport Chat Demo</title>

<style>

:root{

  --bg:#05070d;--panel:rgba(14,20,34,.86);--panel2:rgba(255,255,255,.07);

  --line:rgba(120,255,220,.22);--mint:#69ffd0;--cyan:#35dfff;--violet:#b544ff;

  --text:#effff9;--muted:rgba(239,255,249,.62);--danger:#ff5d87;

}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}

body{

  background:

    radial-gradient(circle at 20% 10%,rgba(105,255,208,.18),transparent 32%),

    radial-gradient(circle at 85% 15%,rgba(181,68,255,.18),transparent 35%),

    radial-gradient(circle at 50% 100%,rgba(53,223,255,.12),transparent 45%),

    #05070d;

}

button,input{font:inherit}

#app{height:100%;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom);}

.top{

  padding:12px 0 10px;

  display:flex;align-items:center;justify-content:space-between;gap:10px;

}

.brand{line-height:1}

.brand h1{margin:0;font-size:18px;letter-spacing:.14em;text-transform:uppercase}

.brand small{color:var(--muted);font-size:11px;letter-spacing:.08em}

.status{

  border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;

  padding:7px 10px;font-size:11px;color:var(--muted);white-space:nowrap;

}

.status.on{color:var(--mint);box-shadow:0 0 20px rgba(105,255,208,.12) inset}

.card{

  border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(18px);

  border-radius:22px;box-shadow:0 18px 60px rgba(0,0,0,.34), inset 0 0 0 1px rgba(255,255,255,.04);

}

.controls{padding:10px;display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:10px}

.controls input{

  min-width:0;border:1px solid var(--line);background:rgba(0,0,0,.24);color:var(--text);

  border-radius:15px;padding:12px;outline:none;

}

.controls button,.composer button{

  border:0;border-radius:15px;color:#00110d;font-weight:800;padding:0 14px;

  background:linear-gradient(135deg,var(--mint),var(--cyan));box-shadow:0 0 24px rgba(105,255,208,.18);

}

.controls button:active,.composer button:active{transform:scale(.97)}

.chat{

  flex:1;min-height:0;position:relative;overflow:hidden;padding:10px;

  display:flex;flex-direction:column;

}

#messages{

  flex:1;overflow-y:auto;overscroll-behavior:contain;padding:4px 2px 14px;

  display:flex;flex-direction:column;gap:9px;

}

.msg{

  max-width:86%;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.07);

  border-radius:18px;padding:9px 11px;box-shadow:0 8px 22px rgba(0,0,0,.17);

  animation:pop .15s ease-out;

}

.msg.me{align-self:flex-end;background:linear-gradient(135deg,rgba(105,255,208,.20),rgba(53,223,255,.13));border-color:rgba(105,255,208,.25)}

.msg.sys{align-self:center;max-width:94%;font-size:12px;color:var(--muted);background:rgba(255,255,255,.04)}

.meta{display:flex;gap:7px;align-items:center;margin-bottom:4px;font-size:11px;color:var(--muted)}

.name{color:var(--mint);font-weight:800}

.text{font-size:15px;line-height:1.34;white-space:pre-wrap;word-wrap:break-word}

.time{margin-left:auto;opacity:.75}

@keyframes pop{from{opacity:.2;transform:translateY(4px)}to{opacity:1;transform:none}}

.composer{

  margin-top:10px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px;

}

.composer input{

  min-width:0;border:1px solid var(--line);background:rgba(0,0,0,.28);color:var(--text);

  border-radius:17px;padding:14px;outline:none;font-size:16px;

}

.composer button{min-width:72px;font-size:15px}

.hint{padding:8px 4px 0;color:var(--muted);font-size:11px;text-align:center}

.err{color:var(--danger)}

</style>

</head>

<body>

<div id="app">

  <div class="top">

    <div class="brand">

      <h1>Fireport Chat</h1>

      <small>Firebase live room demo</small>

    </div>

    <div id="status" class="status">connecting...</div>

  </div>

  <div class="controls card">

    <input id="nameInput" maxlength="22" placeholder="nickname" />

    <input id="roomInput" maxlength="32" placeholder="room name" />

    <button id="joinBtn">JOIN</button>

  </div>

  <main class="chat card">

    <div id="messages"></div>

    <form id="composer" class="composer">

      <input id="msgInput" maxlength="700" autocomplete="off" placeholder="type message..." />

      <button id="sendBtn" type="submit">SEND</button>

    </form>

    <div id="hint" class="hint">Room messages sync live through Firestore.</div>

  </main>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

  getFirestore,

  collection,

  doc,

  addDoc,

  setDoc,

  serverTimestamp,

  query,

  orderBy,

  limit,

  onSnapshot,

  deleteDoc

} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyCpTKAf16xnwdKZZzdBNiLLpXpckYvxWrQ",

  authDomain: "chatdemo-v1.firebaseapp.com",

  projectId: "chatdemo-v1",

  storageBucket: "chatdemo-v1.firebasestorage.app",

  messagingSenderId: "847054956955",

  appId: "1:847054956955:web:a6bf9dc14a6b17edcc193e"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const els = {

  status: document.getElementById("status"),

  messages: document.getElementById("messages"),

  name: document.getElementById("nameInput"),

  room: document.getElementById("roomInput"),

  join: document.getElementById("joinBtn"),

  form: document.getElementById("composer"),

  msg: document.getElementById("msgInput"),

  hint: document.getElementById("hint")

};

const state = {

  uid: localStorage.fireport_uid || crypto.randomUUID(),

  name: localStorage.fireport_name || "Guest" + Math.floor(Math.random() * 999),

  room: localStorage.fireport_room || "main",

  unsubscribe: null,

  presenceTimer: null

};

localStorage.fireport_uid = state.uid;

els.name.value = state.name;

els.room.value = state.room;

const clean = v => String(v || "").trim().replace(/[^\w\- ]+/g, "").slice(0, 32) || "main";

const esc = s => String(s || "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));

const timeOf = ts => {

  try {

    const d = ts?.toDate ? ts.toDate() : new Date();

    return d.toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });

  } catch { return ""; }

};

function setStatus(text, good=false){

  els.status.textContent = text;

  els.status.classList.toggle("on", good);

}

function systemLine(text, bad=false){

  const div = document.createElement("div");

  div.className = "msg sys" + (bad ? " err" : "");

  div.textContent = text;

  els.messages.appendChild(div);

  els.messages.scrollTop = els.messages.scrollHeight;

}

function renderMessage(data){

  const mine = data.uid === state.uid;

  const div = document.createElement("div");

  div.className = "msg" + (mine ? " me" : "");

  div.innerHTML = `

    <div class="meta">

      <span class="name">${esc(data.name || "Guest")}</span>

      <span class="time">${esc(timeOf(data.createdAt))}</span>

    </div>

    <div class="text">${esc(data.text || "")}</div>

  `;

  return div;

}

async function updatePresence(){

  const ref = doc(db, "rooms", state.room, "presence", state.uid);

  await setDoc(ref, {

    uid: state.uid,

    name: state.name,

    room: state.room,

    lastSeen: serverTimestamp()

  }, { merge:true });

}

async function joinRoom(){

  state.name = clean(els.name.value).slice(0,22) || "Guest";

  state.room = clean(els.room.value).toLowerCase().replace(/\s+/g,"-") || "main";

  localStorage.fireport_name = state.name;

  localStorage.fireport_room = state.room;

  els.messages.innerHTML = "";

  systemLine("Joined fireport://" + state.room);

  if(state.unsubscribe) state.unsubscribe();

  if(state.presenceTimer) clearInterval(state.presenceTimer);

  try{

    await updatePresence();

    state.presenceTimer = setInterval(() => updatePresence().catch(()=>{}), 25000);

    const q = query(

      collection(db, "rooms", state.room, "messages"),

      orderBy("createdAt", "asc"),

      limit(80)

    );

    state.unsubscribe = onSnapshot(q, snap => {

      els.messages.innerHTML = "";

      snap.forEach(docSnap => els.messages.appendChild(renderMessage(docSnap.data())));

      els.messages.scrollTop = els.messages.scrollHeight;

      setStatus("live: " + state.room, true);

    }, err => {

      console.error(err);

      setStatus("firestore error", false);

      systemLine("Firestore blocked this request. Check Firestore Database is created and rules allow testing.", true);

    });

  }catch(err){

    console.error(err);

    setStatus("connection failed", false);

    systemLine(err.message || "Could not connect to Firebase.", true);

  }

}

async function sendMessage(e){

  e.preventDefault();

  const text = els.msg.value.trim();

  if(!text) return;

  els.msg.value = "";

  els.msg.focus();

  try{

    await addDoc(collection(db, "rooms", state.room, "messages"), {

      uid: state.uid,

      name: state.name,

      text,

      createdAt: serverTimestamp()

    });

  }catch(err){

    console.error(err);

    systemLine("Message failed: " + err.message, true);

  }

}

window.addEventListener("beforeunload", () => {

  deleteDoc(doc(db, "rooms", state.room, "presence", state.uid)).catch(()=>{});

});

els.join.addEventListener("click", joinRoom);

els.form.addEventListener("submit", sendMessage);

document.addEventListener("touchmove", e => {

  if(!e.target.closest("#messages")) e.preventDefault();

}, { passive:false });

joinRoom();

</script>

</body>

</html>
